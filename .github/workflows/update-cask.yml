name: Update Cask

on:
  repository_dispatch:
    types: [update-cask]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Update amaranth-check cask
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          SHA256="${{ github.event.client_payload.sha256 }}"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/amaranth-check.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/amaranth-check.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/amaranth-check.rb
          git commit -m "Update amaranth-check to ${VERSION}"
          git push
        env:
          VERSION: ${{ github.event.client_payload.version }}
